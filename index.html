<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Strings Online</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Find Strings Online</h1>
      <button id="themeToggle" class="theme-toggle" title="Toggle light/dark mode"></button>
    </div>
    <p class="subtitle">Extract readable strings from binary files — like the Unix <code>strings</code> command, but in your browser.</p>

    <input type="file" id="fileInput" multiple hidden />
    <input type="file" id="folderInput" webkitdirectory hidden />

    <div class="controls">
      <div class="upload-area" id="dropZone">
        <p>Drag &amp; drop files here, or click to browse</p>
        <div class="upload-buttons">
          <button id="btnFiles" class="btn">Select Files</button>
          <button id="btnFolder" class="btn btn-secondary">Select Folder</button>
        </div>
      </div>

      <div class="options">
        <label>
          Min string length:
          <input type="number" id="minLength" value="4" min="1" max="999" />
        </label>
        <label>
          Encoding:
          <select id="encoding">
            <option value="both" selected>ASCII + UTF-16</option>
            <option value="ascii">ASCII only</option>
            <option value="utf16">UTF-16 only</option>
          </select>
        </label>
      </div>
    </div>

    <div id="results" class="results hidden">
      <div class="results-header">
        <h2>Results</h2>
        <div class="results-actions">
          <span id="stats" class="stats"></span>
          <button id="btnCopy" class="btn btn-small">Copy All</button>
          <button id="btnDownload" class="btn btn-small">Download</button>
          <button id="btnClear" class="btn btn-small btn-secondary">Clear</button>
        </div>
      </div>
      <div id="output" class="output"></div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
